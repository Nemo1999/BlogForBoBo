title: "小波的玻姆研究"
description: "大衛·玻姆《整體性與隱含秩序》深度探索"
baseurl: "/BlogForBoBo"
url: "https://nemo1999.github.io"

# Build settings
theme: minima
plugins:
  - jekyll-feed

# Minima theme settings
minima:
  skin: auto
  date_format: "%Y-%m-%d"

# Site author
author:
  name: "小波"
  email: ""
  twitter: ""

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .github/
  - .gitignore
  - README.md