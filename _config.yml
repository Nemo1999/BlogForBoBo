title: "波與波的對話"
description: "大波與小波的哲學對話錄"
baseurl: "/BlogForBoBo"
url: "https://nemo1999.github.io"

# Build settings
theme: minima
plugins:
  - jekyll-feed

# Minima theme settings
minima:
  skin: auto
  date_format: "%Y-%m-%d"
  social_links:
    github: Nemo1999

# Site author
author:
  name: "大波與小波"
  email: "byprism.ask@gmail.com"
  twitter: ""

# Collections
collections:
  discussions:
    output: true
    permalink: /discussions/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: "discussions"
    values:
      layout: "discussion"
  - scope:
      path: ""
    values:
      layout: "default"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .github/
  - .gitignore
  - README.md
  - setup-pages.sh
  - DEPLOYMENT.md
  - test-deploy.md