<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玻姆哲學研究 - 訪問控制</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 500px;
            width: 100%;
        }
        
        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 16px;
            line-height: 1.5;
        }
        
        .content {
            padding: 40px 30px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
            font-size: 14px;
        }
        
        input[type="password"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input[type="password"]:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        
        .message.error {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fca5a5;
        }
        
        .message.success {
            background: #d1fae5;
            color: #059669;
            border: 1px solid #6ee7b7;
        }
        
        .copyright-notice {
            margin-top: 30px;
            padding: 20px;
            background: #f9fafb;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
        }
        
        .copyright-notice h3 {
            color: #374151;
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .copyright-notice p {
            color: #6b7280;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 10px;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #6b7280;
            font-size: 14px;
            border-top: 1px solid #e5e7eb;
        }
        
        @media (max-width: 480px) {
            .container {
                border-radius: 15px;
            }
            
            .header, .content {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>玻姆哲學研究</h1>
            <p>大衛·玻姆《整體性與隱含秩序》研究資料庫</p>
        </div>
        
        <div class="content">
            <h2 style="color: #374151; margin-bottom: 20px; font-size: 20px;">🔒 受保護內容</h2>
            <p style="color: #6b7280; margin-bottom: 30px; line-height: 1.6;">
                本網站包含受版權保護的學術內容，僅供授權研究人員和教育工作者使用。
                請輸入訪問密碼以繼續。
            </p>
            
            <form id="passwordForm">
                <div class="form-group">
                    <label for="password">訪問密碼</label>
                    <input type="password" id="password" placeholder="請輸入密碼" required>
                </div>
                
                <button type="submit">進入網站</button>
            </form>
            
            <div id="message" class="message"></div>
            
            <div class="copyright-notice">
                <h3>📄 版權聲明</h3>
                <p>本網站包含大衛·玻姆《整體性與隱含秩序》（1980年）的節選內容，僅供教育和研究目的使用，符合合理使用原則。</p>
                <p>所有英文文本節選均為大衛·玻姆及其遺產的知識產權。中文翻譯為作者原創作品。</p>
                <p style="font-size: 12px; color: #9ca3af;">如需引用或進一步使用，請參考原書並遵守相關版權法律規定。</p>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2026 玻姆哲學研究小組 | 僅限授權訪問</p>
        </div>
    </div>
    
    <script>
        // 設置密碼（可以定期更換）
        const CORRECT_PASSWORD = 'bohm2026';
        
        document.getElementById('passwordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const message = document.getElementById('message');
            
            // 清除之前的消息
            message.style.display = 'none';
            message.className = 'message';
            
            if (password === CORRECT_PASSWORD) {
                // 密碼正確，設置cookie並重定向
                message.textContent = '密碼正確！正在進入網站...';
                message.className = 'message success';
                message.style.display = 'block';
                
                // 設置cookie，有效期1天
                const expires = new Date();
                expires.setTime(expires.getTime() + (24 * 60 * 60 * 1000));
                document.cookie = `bohm_access=true; expires=${expires.toUTCString()}; path=/`;
                
                // 延遲後重定向
                setTimeout(() => {
                    window.location.href = '/BlogForBoBo/';
                }, 1000);
            } else {
                // 密碼錯誤
                message.textContent = '密碼錯誤，請重試。如需訪問權限，請聯繫管理員。';
                message.className = 'message error';
                message.style.display = 'block';
                
                // 清空密碼框
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });
        
        // 檢查是否已經有訪問權限
        function checkAccess() {
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                if (cookie.trim().startsWith('bohm_access=')) {
                    const value = cookie.trim().substring('bohm_access='.length);
                    if (value === 'true') {
                        window.location.href = '/BlogForBoBo/';
                    }
                }
            }
        }
        
        // 頁面加載時檢查訪問權限
        checkAccess();
    </script>
</body>
</html>
